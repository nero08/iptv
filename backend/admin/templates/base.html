<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Deko IPTV Admin{% endblock %}</title>
  <style>
    :root { --bg:#0f1115; --card:#1a1d24; --fg:#e6e6e6; --mut:#8b93a3;
            --acc:#4f8cff; --ok:#3ecf8e; --warn:#ffb454; --bad:#ff5c5c; --line:#2a2e38; }
    * { box-sizing:border-box; }
    body { margin:0; font:14px/1.5 system-ui,sans-serif; background:var(--bg); color:var(--fg); }
    header { background:var(--card); padding:14px 22px; border-bottom:1px solid var(--line);
             display:flex; align-items:center; gap:14px; }
    header h1 { font-size:16px; margin:0; }
    header .sp { flex:1; }
    a { color:var(--acc); text-decoration:none; }
    main { max-width:1000px; margin:24px auto; padding:0 18px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:10px;
            padding:18px; margin-bottom:18px; }
    table { width:100%; border-collapse:collapse; }
    th,td { text-align:left; padding:9px 10px; border-bottom:1px solid var(--line); }
    th { color:var(--mut); font-weight:600; font-size:12px; text-transform:uppercase; }
    code.code { font:600 15px ui-monospace,monospace; letter-spacing:2px; color:var(--ok); }
    .pill { padding:2px 9px; border-radius:20px; font-size:12px; font-weight:600; }
    .pill.active{background:rgba(62,207,142,.15);color:var(--ok);}
    .pill.blocked{background:rgba(255,92,92,.15);color:var(--bad);}
    .pill.expired{background:rgba(255,180,84,.15);color:var(--warn);}
    input,select,button { font:inherit; padding:8px 10px; border-radius:7px;
            border:1px solid var(--line); background:#0c0e12; color:var(--fg); }
    button { background:var(--acc); border:none; color:#fff; cursor:pointer; font-weight:600; }
    button.ghost{background:transparent;border:1px solid var(--line);color:var(--fg);}
    button.bad{background:var(--bad);}
    .row{display:flex;gap:10px;flex-wrap:wrap;align-items:end;}
    label.f{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--mut);}
    .err{background:rgba(255,92,92,.15);color:var(--bad);padding:8px 12px;border-radius:7px;margin-bottom:12px;}
  </style>
</head>
<body>
  <header>
    <h1>🎬 Deko IPTV Admin</h1>
    <a href="/admin/">Comptes</a>
    <span class="sp"></span>
    <a href="/admin/logout">Déconnexion</a>
  </header>
  <main>{% block body %}{% endblock %}</main>
</body>
</html>
