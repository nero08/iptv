name: zen_player
description: "Zen Player — IPTV player with 8-char access-code login."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # Routing
  go_router: ^14.6.2

  # HTTP / networking
  dio: ^5.7.0

  # Video playback (libmpv-based; strong IPTV/HLS/TS support)
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_android_video: ^1.3.6
  media_kit_libs_linux: ^1.2.1
  video_player_media_kit: ^1.0.7

  # Local database (catalog cache, profiles, favorites, history, downloads)
  drift: ^2.20.3
  sqlite3_flutter_libs: ^0.5.26
  path_provider: ^2.1.5
  path: ^1.9.0

  # Secure storage (access code + device id)
  flutter_secure_storage: ^9.2.2

  # Device info (device name for backend)
  device_info_plus: ^11.1.1

  # Permissions (storage on external download path, if used)
  permission_handler: ^11.3.1

  # Images
  cached_network_image: ^3.4.1

  # IDs + i18n
  uuid: ^4.5.1
  intl: ^0.19.0

  # Screen wake lock (keeps Firestick screen on during playback)
  wakelock_plus: ^1.4.0

  # Code-gen annotations
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  video_player: ^2.10.1
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Host-side sqlite for drift unit tests (loads the system libsqlite3).
  sqlite3: ^2.4.6

  # Mock the path_provider platform channel in download_controller_test.
  path_provider_platform_interface: ^2.1.0
  plugin_platform_interface: ^2.1.0

  # Code generation
  build_runner: ^2.4.13
  drift_dev: ^2.20.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
