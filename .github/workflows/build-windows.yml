name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.5'
          cache: false

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      # windows-latest ships VS 18 (2025). Flutter 3.32.5 does not know VS 18
      # and falls back to 'Visual Studio 16 2019' (not installed). The only
      # reliable generator when MSVC is in PATH via ilammy/msvc-dev-cmd is Ninja.
      #
      # Two patches are required:
      #  1. visual_studio.dart  -- return 'Ninja' for VS major version 18
      #  2. build_windows.dart  -- skip the -A flag (VS-only) and add
      #                            -DCMAKE_BUILD_TYPE=Release (Ninja is
      #                            single-config and ignores --config at build
      #                            time without this flag at configure time)
      #
      # After patching, the precompiled flutter_tools.snapshot is deleted so
      # Flutter recompiles from the patched Dart source (the stamp is based on
      # pubspec.yaml hash, not individual .dart files, so patching a .dart file
      # alone does not invalidate the cached snapshot).
      - name: Patch Flutter for Ninja generator (VS 18 workaround)
        shell: pwsh
        run: |
          $toolsDir = "$env:FLUTTER_ROOT\packages\flutter_tools\lib\src\windows"

          # ---- 1. visual_studio.dart: add 18 => 'Ninja' before wildcard arm ----
          # Line-by-line to avoid LF vs CRLF issues on Windows.
          $vsFile = "$toolsDir\visual_studio.dart"
          $lines  = Get-Content $vsFile
          $out    = [System.Collections.Generic.List[string]]::new()
          $done1  = $false
          foreach ($line in $lines) {
            if (-not $done1 -and $line -match "_ => 'Visual Studio 16 2019'") {
              $out.Add("      18 => 'Ninja',")
              $done1 = $true
            }
            $out.Add($line)
          }
          if (-not $done1) { Write-Error "visual_studio.dart patch did not apply"; exit 1 }
          $out | Set-Content $vsFile -Encoding UTF8
          Write-Host "visual_studio.dart patched."

          # ---- 2. build_windows.dart: remove -A flag, add CMAKE_BUILD_TYPE ----
          # Replace '-A', / getCmakeWindowsArch(...) with a Ninja-only condition.
          $bwFile   = "$toolsDir\build_windows.dart"
          $lines    = Get-Content $bwFile
          $out      = [System.Collections.Generic.List[string]]::new()
          $done2    = $false
          $skipNext = $false
          foreach ($line in $lines) {
            if ($skipNext) { $skipNext = $false; continue }
            if (-not $done2 -and $line.TrimEnd() -eq "      '-A',") {
              $out.Add("      if (generator == 'Ninja') '-DCMAKE_BUILD_TYPE=Release',")
              $skipNext = $true   # drop the getCmakeWindowsArch(...) line
              $done2    = $true
              continue
            }
            $out.Add($line)
          }
          if (-not $done2) { Write-Error "build_windows.dart patch did not apply"; exit 1 }
          $out | Set-Content $bwFile -Encoding UTF8
          Write-Host "build_windows.dart patched."

          # ---- 3. Invalidate snapshot so Flutter recompiles from patched source ----
          Remove-Item -Force "$env:FLUTTER_ROOT\bin\cache\flutter_tools.snapshot" -ErrorAction SilentlyContinue
          Remove-Item -Force "$env:FLUTTER_ROOT\bin\cache\flutter_tools.stamp"    -ErrorAction SilentlyContinue
          Write-Host "Snapshot cleared. Flutter will recompile on next invocation."

      - name: Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Build Windows release
        working-directory: app
        run: |
          flutter build windows --release `
            "--dart-define=ZEN_SUPABASE_URL=${{ secrets.ZEN_SUPABASE_URL }}" `
            "--dart-define=ZEN_ANON_KEY=${{ secrets.ZEN_ANON_KEY }}"

      - name: Install NSIS
        run: choco install nsis --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          makensis /V2 `
            "/DWORKDIR=$env:GITHUB_WORKSPACE" `
            "installer\installer.nsi"

      - name: Upload artifact (GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: deko-iptv-setup
          path: deko-iptv-setup.exe
          retention-days: 30

      - name: Upload to server
        shell: pwsh
        env:
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          curl.exe -sf `
            -X POST `
            -H "Authorization: Bearer $env:ADMIN_API_TOKEN" `
            -F "file=@deko-iptv-setup.exe" `
            "https://api.deko-iptv.fr/admin/api/upload-artifact/deko-iptv-setup.exe"
