name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.5'
          cache: false

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      # Flutter 3.32.5 uses a Dart 3 switch expression in cmakeGenerator:
      #   return switch (_majorVersion) {
      #     17 => 'Visual Studio 17 2022',
      #     _ => 'Visual Studio 16 2019',   <- wildcard fallback
      #   };
      # windows-latest now ships VS 18 (2025). Version 18 hits the wildcard and
      # falls back to 'Visual Studio 16 2019', which isn't installed -> build
      # fails. We insert `18 => 'Visual Studio 18 2025'` before the wildcard.
      # Flutter detects the source-file change and recompiles its tool snapshot.
      - name: Patch Flutter visual_studio.dart for VS 18
        shell: pwsh
        run: |
          $vsFile = Get-ChildItem "$env:FLUTTER_ROOT" -Recurse -Filter "visual_studio.dart" |
            Select-Object -First 1 -ExpandProperty FullName
          Write-Host "Patching: $vsFile"

          $content = Get-Content $vsFile -Raw
          $old = "_ => 'Visual Studio 16 2019'"
          $new = "18 => 'Visual Studio 18 2025',`n      _ => 'Visual Studio 16 2019'"
          $patched = $content.Replace($old, $new)

          if ($patched -eq $content) {
            Write-Error "Patch did not apply -- wildcard arm not found in $vsFile"
            exit 1
          }

          [System.IO.File]::WriteAllText($vsFile, $patched, [System.Text.Encoding]::UTF8)
          Write-Host "Source patched. Deleting precompiled snapshot so Flutter rebuilds from source..."

          # The stamp is based on pubspec.yaml hash, not individual .dart files, so
          # patching a .dart file alone does not invalidate the cached snapshot.
          # Deleting both files forces Flutter to recompile on the next invocation.
          Remove-Item -Force "$env:FLUTTER_ROOT\bin\cache\flutter_tools.snapshot" -ErrorAction SilentlyContinue
          Remove-Item -Force "$env:FLUTTER_ROOT\bin\cache\flutter_tools.stamp"    -ErrorAction SilentlyContinue
          Write-Host "Snapshot and stamp removed. Flutter will recompile on next run."

      - name: Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Build Windows release
        working-directory: app
        run: |
          flutter build windows --release `
            "--dart-define=ZEN_SUPABASE_URL=${{ secrets.ZEN_SUPABASE_URL }}" `
            "--dart-define=ZEN_ANON_KEY=${{ secrets.ZEN_ANON_KEY }}"

      - name: Install NSIS
        run: choco install nsis --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          makensis /V2 `
            "/DWORKDIR=$env:GITHUB_WORKSPACE" `
            "installer\installer.nsi"

      - name: Upload artifact (GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: deko-iptv-setup
          path: deko-iptv-setup.exe
          retention-days: 30

      - name: Upload to server
        shell: pwsh
        env:
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          curl.exe -sf `
            -X POST `
            -H "Authorization: Bearer $env:ADMIN_API_TOKEN" `
            -F "file=@deko-iptv-setup.exe" `
            "https://api.deko-iptv.fr/admin/api/upload-artifact/deko-iptv-setup.exe"
