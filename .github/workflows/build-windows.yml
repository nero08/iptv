name: Build Windows Installer

on:
  workflow_dispatch:

jobs:
  build:
    # windows-2022 ships VS 2022 (17.x), which Flutter 3.32.5 maps correctly
    # to the 'Visual Studio 17 2022' CMake generator. windows-latest now ships
    # VS 2025 (18.x), which is unknown to Flutter 3.32.5.
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.5'
          cache: false

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Flutter dependencies
        working-directory: app
        run: flutter pub get

      - name: Build Windows release
        working-directory: app
        run: |
          flutter build windows --release `
            "--dart-define=ZEN_SUPABASE_URL=${{ secrets.ZEN_SUPABASE_URL }}" `
            "--dart-define=ZEN_ANON_KEY=${{ secrets.ZEN_ANON_KEY }}"

      - name: Install NSIS
        run: choco install nsis --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          makensis /V2 `
            "/DWORKDIR=$env:GITHUB_WORKSPACE" `
            "installer\installer.nsi"

      - name: Upload artifact (GitHub)
        uses: actions/upload-artifact@v4
        with:
          name: deko-iptv-setup
          path: deko-iptv-setup.exe
          retention-days: 30

      - name: Upload to server
        shell: pwsh
        continue-on-error: true
        env:
          ADMIN_API_TOKEN: ${{ secrets.ADMIN_API_TOKEN }}
        run: |
          $response = curl.exe -sv `
            -X POST `
            -H "Authorization: Bearer $env:ADMIN_API_TOKEN" `
            -F "file=@deko-iptv-setup.exe" `
            "https://api.deko-iptv.fr/admin/api/upload-artifact/deko-iptv-setup.exe"
          Write-Host "curl exit code: $LASTEXITCODE"
          Write-Host "Response: $response"
